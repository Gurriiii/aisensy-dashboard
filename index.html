<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ceramic Academy | AiSensy Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight">Broadcast Center <span class="text-indigo-400">Ceramic Academy</span></h1>
        <button onclick="updateData()" class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-500 transition">Refresh Data</button>
    </nav>


    <main class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-2xl">
                <p class="text-slate-400 text-sm">Campaigns Active</p>
                <h3 id="active-count" class="text-4xl font-bold mt-2">--</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border-l-4 border-green-500">
                <p class="text-slate-400 text-sm">Avg. Read Rate</p>
                <h3 id="read-rate" class="text-4xl font-bold mt-2">--%</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border-l-4 border-red-500">
                <p class="text-slate-400 text-sm">Failed Messages</p>
                <h3 id="failed-count" class="text-4xl font-bold mt-2">--</h3>
            </div>
        </div>


        <div class="bg-slate-800 p-8 rounded-3xl">
            <canvas id="broadcastChart" height="100"></canvas>
        </div>
    </main>


    <script>
        let chart;


        async function updateData() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            
            // Logic to parse AiSensy response into Chart.js
            const labels = ['Sent', 'Delivered', 'Read', 'Failed'];
            const counts = [1000, 950, 700, 50]; // Logic would pull from 'data' object


            if(chart) chart.destroy();
            const ctx = document.getElementById('broadcastChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Last 24 Hours',
                        data: counts,
                        backgroundColor: ['#6366f1', '#3b82f6', '#10b981', '#ef4444']
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true }}}
            });
        }
        updateData();
    </script>
</body>
</html>
